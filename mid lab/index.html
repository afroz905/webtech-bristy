<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Manager</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Student Manager</h1>

<!-- Student Form -->
<form id="student-form">

<label>Roll No:</label>
<input type="text" id="roll" placeholder="Enter Roll">

<label>Name:</label>
<input type="text" id="name" placeholder="Enter Name">

<button type="submit" id="addBtn" disabled>Add Student</button>

</form>

<!-- Search -->
<input type="text" id="search" placeholder="Search student">

<!-- Buttons -->
<button id="sortBtn">Sort A-Z</button>
<button id="highlightBtn">Highlight First Student</button>

<!-- Student List -->
<ul id="student-list"></ul>

<!-- Counts -->
<p id="total">Total students: 0</p>
<p id="attendance">Present: 0 , Absent: 0</p>

<script src="script.js"></script>

</body>
</html>
